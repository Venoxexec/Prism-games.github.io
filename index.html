<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Prism Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* â”€â”€ RESET & BASE â”€â”€ */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0b0b0e;
  --surface:#111115;
  --surface2:#18181e;
  --surface3:#202028;
  --border:rgba(255,255,255,.06);
  --border2:rgba(255,255,255,.10);
  --accent:#6c3fff;
  --accent-dim:rgba(108,63,255,.18);
  --gold:#e8b84b;
  --text:#ededf5;
  --text2:#8888a8;
  --text3:#4e4e68;
  --green:#22c55e;
  --red:#e04060;
  --radius:8px;
  --nav-h:52px;
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* â”€â”€ NAV â”€â”€ */
nav{
  position:sticky;top:0;z-index:200;
  height:var(--nav-h);
  background:rgba(11,11,14,.94);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 14px;gap:10px;
}
.nav-logo{
  display:flex;align-items:center;gap:8px;
  text-decoration:none;flex-shrink:0;cursor:pointer;
  user-select:none;
}
.nav-logo-icon{
  width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.nav-logo-text{
  font-size:.95rem;font-weight:800;letter-spacing:-.3px;
  color:var(--text);
}
.nav-cats{
  display:flex;gap:1px;overflow-x:auto;flex:1;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.nav-cats::-webkit-scrollbar{display:none;}
.cat-btn{
  background:none;border:none;
  color:var(--text3);
  font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:600;
  padding:5px 9px;border-radius:5px;
  cursor:pointer;white-space:nowrap;
  transition:color .13s,background .13s;
  display:flex;align-items:center;gap:5px;
}
.cat-btn svg{width:11px;height:11px;fill:currentColor;flex-shrink:0;}
.cat-btn:hover{color:var(--text2);background:var(--surface3);}
.cat-btn.active{
  background:var(--accent);
  color:#fff;
}
.nav-search{
  display:flex;align-items:center;gap:6px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:0 10px;
  height:30px;
  flex-shrink:0;
  transition:border-color .13s;
}
.nav-search:focus-within{border-color:rgba(108,63,255,.45);}
.nav-search svg{width:12px;height:12px;color:var(--text3);flex-shrink:0;}
.nav-search input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:.75rem;font-weight:500;
  width:120px;
}
.nav-search input::placeholder{color:var(--text3);}

/* â”€â”€ HERO â”€â”€ */
.hero{
  position:relative;z-index:1;
  padding:20px 16px 12px;
  text-align:center;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:4px;padding:3px 10px;
  font-size:.62rem;font-weight:700;
  color:var(--text3);letter-spacing:1.2px;
  text-transform:uppercase;margin-bottom:9px;
}
.hero-badge svg{width:10px;height:10px;fill:var(--accent);}
.hero h1{
  font-size:clamp(1.4rem,5vw,2.4rem);
  font-weight:900;letter-spacing:-.4px;line-height:1.1;
  margin-bottom:5px;
  color:var(--text);
}
.hero h1 span{color:var(--accent);}
.hero p{color:var(--text2);font-size:.83rem;max-width:380px;margin:0 auto;}

/* â”€â”€ SECTION HEAD â”€â”€ */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;margin-bottom:10px;
}
.section-label{
  font-size:.86rem;font-weight:800;
  display:flex;align-items:center;gap:7px;
  letter-spacing:.2px;
}
.section-label::before{
  content:'';display:block;
  width:3px;height:14px;border-radius:2px;
  background:var(--accent);
}
.game-count{
  font-size:.65rem;color:var(--text3);
  font-family:'JetBrains Mono',monospace;
}

/* â”€â”€ GAMES GRID â”€â”€ */
.wrapper{
  position:relative;z-index:1;
  padding:0 10px 80px;
}
#games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:8px;
}

/* â”€â”€ GAME CARD â”€â”€ */
.game-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  text-decoration:none;
  display:block;
  transition:transform .16s,border-color .16s,box-shadow .16s;
  position:relative;
}
.game-card:hover{
  transform:translateY(-2px);
  border-color:rgba(108,63,255,.3);
  box-shadow:0 4px 18px rgba(0,0,0,.45);
}
.game-card:active{transform:scale(.97);}
.card-thumb{
  width:100%;aspect-ratio:16/11;
  background:var(--surface2);
  position:relative;overflow:hidden;
}
.card-thumb img{
  width:100%;height:100%;object-fit:cover;
  display:block;
  transition:transform .28s;
}
.game-card:hover .card-thumb img{
  transform:scale(1.04);
}
.card-thumb .thumb-fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface3);
}
.card-thumb .thumb-fallback svg{
  width:28px;height:28px;
  color:var(--text3);
  fill:none;stroke:currentColor;stroke-width:1.4;
  stroke-linecap:round;stroke-linejoin:round;
}
.card-play{
  position:absolute;inset:0;
  background:rgba(0,0,0,.52);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .16s;
}
.game-card:hover .card-play{opacity:1;}
.card-play svg{
  width:32px;height:32px;fill:none;
  stroke:rgba(255,255,255,.88);stroke-width:1.6;
  stroke-linecap:round;stroke-linejoin:round;
}
.card-tag{
  position:absolute;top:5px;left:5px;
  font-size:.5rem;font-weight:800;letter-spacing:.7px;
  text-transform:uppercase;padding:2px 5px;border-radius:3px;
  pointer-events:none;
}
.tag-hot{background:var(--red);color:#fff;}
.tag-new{background:var(--green);color:#000;}
.tag-pop{background:var(--gold);color:#000;}

.card-info{padding:7px 9px 9px;}
.card-name{
  font-size:.79rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:1px;
}
.card-cat{
  font-size:.6rem;color:var(--text3);
  font-weight:600;text-transform:uppercase;letter-spacing:.4px;
}

/* â”€â”€ EMPTY STATE â”€â”€ */
.empty-state{
  display:none;text-align:center;padding:60px 20px;color:var(--text3);
  grid-column:1/-1;
}
.empty-state.show{display:block;}
.empty-state .icon{
  display:flex;justify-content:center;margin-bottom:12px;
  color:var(--text3);
}

/* â”€â”€ SCROLL TO TOP â”€â”€ */
#scrolltop{
  position:fixed;bottom:18px;right:14px;z-index:100;
  width:34px;height:34px;border-radius:6px;
  background:var(--surface2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;pointer-events:none;
  transition:opacity .18s,transform .13s;
}
#scrolltop.show{opacity:1;pointer-events:all;}
#scrolltop:hover{transform:translateY(-2px);}
#scrolltop svg{width:15px;height:15px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* â”€â”€ RESPONSIVE â”€â”€ */
@media(max-width:480px){
  #games-grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr));}
  .nav-search{display:none;}
}
@media(min-width:768px){
  #games-grid{grid-template-columns:repeat(auto-fill,minmax(168px,1fr));}
  nav{padding:0 20px;}
  .wrapper{padding:0 16px 80px;}
  .section-head{padding:0 16px;}
}
@media(min-width:1024px){
  #games-grid{grid-template-columns:repeat(auto-fill,minmax(178px,1fr));}
}
</style>
</head>

// â”€â”€ STATE â”€â”€
let currentCat = 'all';
let searchQ = '';

// â”€â”€ RENDER â”€â”€
function render() {
  const grid = document.getElementById('games-grid');
  const empty = document.getElementById('emptyState');
  const lbl = document.getElementById('sectionLabel');
  const cnt = document.getElementById('gameCount');

  let list = GAMES;
  if (currentCat !== 'all') {
    list = list.filter(g => g.cat.toLowerCase().includes(currentCat.toLowerCase()));
  }
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(g => g.name.toLowerCase().includes(q) || g.cat.toLowerCase().includes(q));
  }

  // deduplicate by name
  const seen = new Set();
  list = list.filter(g => { if(seen.has(g.name)) return false; seen.add(g.name); return true; });

  cnt.textContent = list.length + ' games';
  if (searchQ) lbl.textContent = 'Search Results';
  else if (currentCat === 'all') lbl.textContent = 'All Games';
  else lbl.textContent = currentCat;

  if (!list.length) {
    grid.innerHTML = '';
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');

  grid.innerHTML = list.map(g => {
    const tagHtml = g.tag
      ? `<div class="card-tag tag-${g.tag==='pop'?'pop':g.tag==='hot'?'hot':'new'}">${g.tag==='pop'?'Pop':g.tag==='hot'?'Hot':'New'}</div>`
      : '';
    return `
    <a class="game-card" href="${g.url}" target="_blank" rel="noopener">
      <div class="card-thumb">
        <img src="${g.img}" alt="${g.name}" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="thumb-fallback" style="display:none">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="7" width="20" height="13" rx="3"/>
            <path d="M8 13h2M9 12v2"/>
            <circle cx="15" cy="12" r=".8" fill="currentColor" stroke="none"/>
            <circle cx="17" cy="13.5" r=".8" fill="currentColor" stroke="none"/>
            <path d="M7 7V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>
          </svg>
        </div>
        <div class="card-play">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"/>
            <path d="M10 8.5l5 3.5-5 3.5V8.5z" fill="rgba(255,255,255,.9)" stroke="none"/>
          </svg>
        </div>
        ${tagHtml}
      </div>
      <div class="card-info">
        <div class="card-name">${g.name}</div>
        <div class="card-cat">${g.cat.split(' ')[0]}</div>
      </div>
    </a>`;
  }).join('');
}

// â”€â”€ FILTER â”€â”€
function filterCat(cat) {
  currentCat = cat;
  searchQ = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// â”€â”€ SEARCH â”€â”€
function handleSearch() {
  searchQ = document.getElementById('searchInput').value.trim();
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (!searchQ) {
    document.querySelector('[data-cat="all"]').classList.add('active');
    currentCat = 'all';
  }
  render();
}

// â”€â”€ SCROLL TOP â”€â”€
window.addEventListener('scroll',()=>{
  document.getElementById('scrolltop').classList.toggle('show', window.scrollY > 300);
});

// â”€â”€ INIT â”€â”€
render();
</script>
