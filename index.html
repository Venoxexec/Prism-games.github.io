<title>Prism Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
/* ── RESET & BASE ── */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0c0c10;
  --surface:#141418;
  --surface2:#1c1c22;
  --surface3:#242430;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --accent:#e040fb;
  --accent2:#7c4dff;
  --accent3:#00e5ff;
  --gold:#ffea00;
  --text:#f0f0f8;
  --text2:#a0a0c0;
  --text3:#606080;
  --green:#00e676;
  --red:#ff1744;
  --radius:14px;
  --nav-h:58px;
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── BACKGROUND ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(124,77,255,.08) 0%,transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 80%,rgba(224,64,251,.07) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:200;
  height:var(--nav-h);
  background:rgba(12,12,16,.88);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 16px;gap:12px;
}
.nav-logo{
  display:flex;align-items:center;gap:8px;
  text-decoration:none;flex-shrink:0;cursor:pointer;
}
.nav-logo-icon{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.nav-logo-text{
  font-size:1.1rem;font-weight:800;letter-spacing:-.3px;
  background:linear-gradient(90deg,#e040fb,#7c4dff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.nav-cats{
  display:flex;gap:3px;overflow-x:auto;flex:1;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.nav-cats::-webkit-scrollbar{display:none;}
.cat-btn{
  background:none;border:none;
  color:var(--text3);
  font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;
  padding:5px 11px;border-radius:20px;
  cursor:pointer;white-space:nowrap;
  transition:all .15s;
}
.cat-btn:hover{color:var(--text);background:var(--surface3);}
.cat-btn.active{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;
}
.nav-search{
  display:flex;align-items:center;gap:6px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:24px;padding:6px 14px;
  flex-shrink:0;
  transition:border-color .2s;
}
.nav-search:focus-within{border-color:var(--accent);}
.nav-search svg{width:14px;height:14px;opacity:.4;flex-shrink:0;}
.nav-search input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.72rem;
  width:120px;
}
.nav-search input::placeholder{color:var(--text3);}

/* ── HERO ── */
.hero{
  position:relative;z-index:1;
  padding:28px 16px 16px;
  text-align:center;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(124,77,255,.12);
  border:1px solid rgba(124,77,255,.25);
  border-radius:20px;padding:3px 12px;
  font-size:.7rem;font-weight:700;
  color:#b39ddb;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:10px;
}
.hero h1{
  font-size:clamp(1.6rem,5vw,2.8rem);
  font-weight:900;letter-spacing:-.5px;line-height:1.1;
  margin-bottom:6px;
}
.hero h1 span{
  background:linear-gradient(90deg,var(--accent3),var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero p{color:var(--text2);font-size:.88rem;max-width:420px;margin:0 auto;}

/* ── SECTION HEAD ── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;margin-bottom:12px;
}
.section-label{
  font-size:1rem;font-weight:800;
  display:flex;align-items:center;gap:8px;
}
.section-label::before{
  content:'';display:block;
  width:4px;height:18px;border-radius:2px;
  background:linear-gradient(to bottom,var(--accent),var(--accent2));
}
.game-count{
  font-size:.72rem;color:var(--text3);
  font-family:'JetBrains Mono',monospace;
}

/* ── GAMES GRID ── */
.wrapper{
  position:relative;z-index:1;
  padding:0 12px 80px;
}
#games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}

/* ── GAME CARD ── */
.game-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  text-decoration:none;
  display:block;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  position:relative;
}
.game-card:hover{
  transform:translateY(-4px) scale(1.01);
  border-color:rgba(224,64,251,.4);
  box-shadow:0 8px 24px rgba(124,77,255,.2);
}
.game-card:active{transform:scale(.97);}
.card-thumb{
  width:100%;aspect-ratio:16/11;
  background:var(--surface2);
  position:relative;overflow:hidden;
}
.card-thumb img{
  width:100%;height:100%;object-fit:cover;
  display:block;
  transition:transform .3s,filter .3s;
}
.game-card:hover .card-thumb img{
  transform:scale(1.06);filter:brightness(1.1);
}
.card-thumb .thumb-fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
}
.card-play{
  position:absolute;inset:0;
  background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.game-card:hover .card-play{opacity:1;}
.card-play svg{width:32px;height:32px;fill:rgba(255,255,255,.9);}
.card-tag{
  position:absolute;top:6px;left:6px;
  font-size:.55rem;font-weight:800;letter-spacing:.8px;
  text-transform:uppercase;padding:2px 7px;border-radius:4px;
  pointer-events:none;
}
.tag-hot{background:var(--red);color:#fff;}
.tag-new{background:var(--green);color:#000;}
.tag-pop{background:var(--gold);color:#000;}

.card-info{padding:8px 10px 10px;}
.card-name{
  font-size:.82rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:2px;
}
.card-cat{
  font-size:.64rem;color:var(--text3);
  font-weight:600;text-transform:uppercase;letter-spacing:.5px;
}

/* ── LOAD ERROR OVERLAY ── */
.card-thumb img.broken{display:none;}

/* ── FAILED SEARCH ── */
.empty-state{
  display:none;text-align:center;padding:60px 20px;color:var(--text3);
  grid-column:1/-1;
}
.empty-state.show{display:block;}
.empty-state .icon{font-size:3rem;margin-bottom:12px;}

/* ── SCROLL TO TOP ── */
#scrolltop{
  position:fixed;bottom:20px;right:16px;z-index:100;
  width:40px;height:40px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;
}
#scrolltop.show{opacity:1;pointer-events:all;}
#scrolltop:hover{transform:translateY(-2px);}
#scrolltop svg{width:18px;height:18px;fill:var(--text2);}

/* ── RESPONSIVE ── */
@media(max-width:500px){
  #games-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
  .nav-search{display:none;}
  .nav-logo-text{font-size:1rem;}
}
@media(min-width:768px){
  #games-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));}
  nav{padding:0 20px;}
  .wrapper{padding:0 16px 80px;}
  .section-head{padding:0 16px;}
}
@media(min-width:1024px){
  #games-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
}
</style>
</head>

// ── STATE ──
let currentCat = 'all';
let searchQ = '';

// ── RENDER ──
function render() {
  const grid = document.getElementById('games-grid');
  const empty = document.getElementById('emptyState');
  const lbl = document.getElementById('sectionLabel');
  const cnt = document.getElementById('gameCount');

  let list = GAMES;
  if (currentCat !== 'all') {
    list = list.filter(g => g.cat.toLowerCase().includes(currentCat.toLowerCase()));
  }
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(g => g.name.toLowerCase().includes(q) || g.cat.toLowerCase().includes(q));
  }

  // deduplicate by name
  const seen = new Set();
  list = list.filter(g => { if(seen.has(g.name)) return false; seen.add(g.name); return true; });

  cnt.textContent = list.length + ' games';
  if (searchQ) lbl.textContent = 'Search Results';
  else if (currentCat === 'all') lbl.textContent = 'All Games';
  else lbl.textContent = currentCat;

  if (!list.length) {
    grid.innerHTML = '';
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');

  grid.innerHTML = list.map(g => {
    const tagHtml = g.tag ? `<div class="card-tag tag-${g.tag==='pop'?'pop':g.tag==='hot'?'hot':'new'}">${g.tag==='pop'?'Popular':g.tag==='hot'?'🔥 Hot':'✨ New'}</div>` : '';
    return `
    <a class="game-card" href="${g.url}" target="_blank" rel="noopener">
      <div class="card-thumb">
        <img src="${g.img}" alt="${g.name}" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="thumb-fallback" style="display:none">🎮</div>
        <div class="card-play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        ${tagHtml}
      </div>
      <div class="card-info">
        <div class="card-name">${g.name}</div>
        <div class="card-cat">${g.cat.split(' ')[0]}</div>
      </div>
    </a>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat) {
  currentCat = cat;
  searchQ = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── SEARCH ──
function handleSearch() {
  searchQ = document.getElementById('searchInput').value.trim();
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (!searchQ) {
    document.querySelector('[data-cat="all"]').classList.add('active');
    currentCat = 'all';
  }
  render();
}

// ── SCROLL TOP ──
window.addEventListener('scroll',()=>{
  document.getElementById('scrolltop').classList.toggle('show', window.scrollY > 300);
});

// ── INIT ──
render();
</script>
