<!DOCTYPE html>
<html>
  <head>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <link rel="icon" href="https://venoxexec.github.io/G.png" />
    <title>Prism Games - Game</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      window.addEventListener('popstate', function (event) {
        if (window.location.pathname.includes('/games/game.html')) {
          event.preventDefault()
          window.history.pushState(null, null, window.location.href)
        }
      })
    </script>
    <style>
      body { margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; background-color: rgb(117, 117, 117); }
      ::-webkit-scrollbar { background-color: #2c2c2c; border-radius: 10px; }
      ::-webkit-scrollbar-thumb { background-color: #636363; border-radius: 15px; }
    </style>
  </head>
  <body onresize="resize()">
    <style>
      .loading-screen { display: flex; height: 100vh; width: 100vw; }
      .left-column { width: 30%; padding: 20px; background-color: #1b1b1b; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: space-between; z-index: 2; transition: 1s; }
      .logo img { width: 55px; margin-top: 10px; }
      .loading-content { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
      .loading-circle { width: 25px; height: 25px; border: 4px solid transparent; border-top: 3px solid #5c5c5c; border-radius: 50%; animation: spin 1s linear infinite; margin: 15px; }
      .loading-text { margin: 0; text-align: center; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .buttons { display: flex; gap: 15px; margin-bottom: 20px; }
      .home-button, .skip-loading { padding: 10px 20px; border: none; cursor: pointer; font-size: 1rem; border-radius: 5px; color: #fff; transition: 0.5s; background-color: #444444b0; }
      .home-button:hover, .skip-loading:hover { box-shadow: 0px 0px 10px #000000; }
      .right-column { position: relative; width: 70%; padding: 20px; overflow: hidden; }
      .cover-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; gap: 20px; z-index: 1; }
      .cover-row { display: flex; justify-content: space-around; gap: 15px; transform: rotate(-10deg); }
      .cover { flex: 1; max-width: 22%; height: 200px; border-radius: 10px; min-width: 150px; background-size: cover; background-position: center; object-fit: cover; transition: transform 0.3s ease; opacity: 0.9; }
      @media (min-width: 1200px) { .cover { height: 225px; } }
      @keyframes downan { from { transform: rotate(-10deg) translateY(0); opacity: 1; } to { transform: rotate(-10deg) translateY(20%); opacity: 0; } }
      @keyframes closeload { from { transform: scale(1); opacity: 1; } to { transform: scale(2); opacity: 0; } }
      .game-container { display: flex; width: 100%; height: 100vh; }
      .game-area { flex: 1; height: 100%; position: relative; }
      .sidebar { width: 300px; background-color: #1d1d1d; color: white; height: 100vh; overflow-y: auto; }
      @media (max-width: 1279px) { .sidebar { display: none; } .game-area { width: 100%; } }
    </style>

    <div id="loadingcontainer" style="transition: 0.5s; background-color: #272727; position: fixed; width: 100%; height: 100%; display: block; z-index: 100000;">
      <div class="loading-screen">
        <div id="leftside" class="left-column">
          <div class="logo">
            <img src="https://venoxexec.github.io/G.png" alt="Logo" />
          </div>
          <div class="loading-content">
            <div class="loading-circle"></div>
            <p class="loading-text">Your Game Is Loading</p>
          </div>
          <div class="buttons">
            <a href="https://venoxexec.github.io">
              <button class="home-button">Home</button>
            </a>
            <button class="skip-loading" onclick="skipload()">Skip Loading</button>
          </div>
        </div>
        <div class="right-column">
          <div class="cover-grid">
            <div class="cover-row">
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/slope.webp')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/Bitlife.png')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/Minecraft.png')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/gunnn.png')"></div>
            </div>
            <div class="cover-row">
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/lol.jpeg')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/BASKETBRO.png')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/fnaf1.jpeg')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/fnaf2.webp')"></div>
            </div>
            <div class="cover-row">
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/motox3m.png')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/roblox.jpeg')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/retrobowl.avif')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/pvz.png')"></div>
            </div>
            <div class="cover-row">
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/EGGYCAR.webp')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/gunnn.png')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/CSGO.png')"></div>
              <div class="cover" style="background-image: url('https://venoxexec.github.io/cover/jetpackjoyride.webp')"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener('load', function () { donewithload() })
      function skipload() { donewithload() }
      function donewithload() {
        const elements = document.querySelectorAll('.cover-row')
        elements.forEach((element, index) => {
          setTimeout(() => {
            element.style.animation = 'downan 0.5s'
            setTimeout(() => { element.style.opacity = 0 }, 450)
          }, index * 200)
        })
        setTimeout(() => {
          document.getElementById('leftside').style.transform = 'translateX(-200%)'
          setTimeout(() => { document.getElementById('leftside').style.opacity = 0 }, 500)
          setTimeout(() => {
            document.getElementById('loadingcontainer').style.animation = 'closeload 0.5s'
            setTimeout(() => { document.getElementById('loadingcontainer').style.display = 'none' }, 450)
          }, 300)
        }, 500)
      }
    </script>

    <div class="game-container">
      <div class="game-area">
        <iframe frameborder="0" id="game" style="text-align: center; overflow: hidden; width: 100%; height: 100%" src="" allowfullscreen></iframe>
      </div>
      <div class="sidebar">
        <div style="margin: 20px; text-align: center">
          <a href="https://venoxexec.github.io" style="text-decoration: none; color: white; display: inline-flex; align-items: center; background-color: #6c3fff; padding: 8px 15px; border-radius: 8px; transition: all 0.3s ease;">
            ← Back to Prism Games
          </a>
        </div>
      </div>
    </div>

    <div style="transition: 0.5s; cursor: pointer; position: fixed; border-radius: 15px; color: rgb(224, 224, 224); background-color: #1d1d1dc0; left: 0; bottom: 0px; margin: 10px;" id="Menu">
      <span class="material-icons buttonForMenu" style="margin: 5px" onclick="window.location = 'https://venoxexec.github.io'">arrow_back</span>
      <span class="material-icons buttonForMenu" style="margin: 5px" onclick="makeFullScreen()">fullscreen</span>
      <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
        if (isMobile) { document.getElementById('Menu').style.transform = 'scale(1.1)' }
        else { document.getElementById('Menu').style.transform = 'scale(1.0)' }
      </script>
    </div>

    <script>
      var isFUll = false
      document.body.onkeyup = function (e) { if (e.keyCode == 27) { if (isFUll) {} } }

      function requestFullScreen(element) {
        var requestMethod = element.requestFullScreen || element.webkitRequestFullScreen || element.mozRequestFullScreen || element.msRequestFullscreen
        if (requestMethod) {
          requestMethod.call(element)
          document.getElementById('game').height = window.innerHeight
        } else if (typeof window.ActiveXObject !== 'undefined') {
          var wscript = new ActiveXObject('WScript.Shell')
          if (wscript !== null) { wscript.SendKeys('{F11}') }
        }
      }

      var canvas = document.getElementById('game')
      function makeFullScreen() { isFUll = true; requestFullScreen(canvas) }

      function resize() {
        document.getElementById('game').height = window.innerHeight
        checkSidebarVisibility()
      }
      function checkSidebarVisibility() {}

      window.onresize = resize
      window.addEventListener('load', function () { resize() })

      var textElement = document.getElementById('game')
      textElement.addEventListener('beforeunload', function (event) { event.preventDefault() })

      var currentUrl = new URL(window.location.href)
      if (currentUrl.searchParams.has('game')) {
        textElement.src = currentUrl.searchParams.get('game')
      }
      console.log(currentUrl.searchParams.get('game'))
    </script>
  </body>
</html>
